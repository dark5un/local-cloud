grafana:
  adminPassword: local-dev
  service:
    type: NodePort
    nodePort: 30300
  persistence:
    enabled: false
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ""
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default
  dashboards:
    default:
      local-cloud:
        url: https://raw.githubusercontent.com/dark5un/local-cloud/main/monitoring/dashboards/local-cloud.json

prometheus:
  prometheusSpec:
    retention: 24h
    resources:
      requests:
        memory: 256Mi
      limits:
        memory: 1Gi

alertmanager:
  enabled: false