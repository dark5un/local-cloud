name: 'OpenTofu CI'

on:
  pull_request:
    paths:
      - 'infrastructure/**'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  tofu-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dagger CLI
        uses: dagger/dagger-for-github@v7
        with:
          version: '0.21.7'
          verb: download

      - name: fmt-check
        working-directory: pipeline
        run: dagger call fmt-check

      - name: validate-modules
        working-directory: pipeline
        run: dagger call validate-modules

      - name: test-modules
        working-directory: pipeline
        run: dagger call test-modules

      - name: integration-plan
        working-directory: pipeline
        continue-on-error: true
        run: dagger call integration-plan