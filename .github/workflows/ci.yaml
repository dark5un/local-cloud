name: 'OpenTofu CI'

on:
  pull_request:
    paths:
      - 'infrastructure/**'
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  tofu-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dagger CLI
        uses: dagger/dagger-for-github@v7
        with:
          version: '0.21.7'
          verb: download

      - name: Check formatting
        working-directory: pipeline
        run: dagger call fmt-check

      - name: Validate modules
        working-directory: pipeline
        run: dagger call validate-modules

      - name: Run tests
        working-directory: pipeline
        run: dagger call test-modules

  pulumi-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: infrastructure/pulumi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Pulumi CLI
        run: |
          curl -fsSL https://get.pulumi.com | sh
          echo "$HOME/.pulumi/bin" >> $GITHUB_PATH

      - name: Build check
        run: go build ./...

      - name: Run unit tests
        run: go test -v -count=1 ./...