name: OpenTofu CI

on:
  pull_request:
    paths:
      - 'infrastructure/opentofu/**'
  push:
    branches: [main]
    paths:
      - 'infrastructure/opentofu/**'

jobs:
  tofu-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          opentofu_version: 1.12.1

      - name: Start Floci
        run: |
          docker run -d --name floci -p 4566:4566 localstack/floci:latest
          for i in $(seq 1 15); do
            curl -sf http://localhost:4566/_localstack/health && break
            sleep 2
          done

      - name: Lint
        working-directory: infrastructure/opentofu
        run: tofu fmt -check -recursive .

      - name: Validate modules
        working-directory: infrastructure/opentofu
        run: |
          for mod in modules/*; do
            echo "=== $mod ==="
            (cd $mod && tofu init && tofu validate)
          done

      - name: Run tests
        working-directory: infrastructure/opentofu
        run: |
          for mod in modules/* environments/local; do
            echo "=== $mod ==="
            (cd $mod && tofu init && tofu test)
          done

      - name: Plan preview
        working-directory: infrastructure/opentofu/environments/local
        run: |
          tofu init
          tofu plan -no-color | tee /tmp/plan.out || true

      - name: Stop Floci
        if: always()
        run: docker stop floci || true
