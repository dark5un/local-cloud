name: 'OpenTofu Integration Plan'

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dagger CLI
        uses: dagger/dagger-for-github@v7
        with:
          version: '0.21.7'
          verb: download

      - name: Generate integration plan
        working-directory: pipeline
        run: dagger call integration-plan