# Local Cloud Foundation
# Floci (AWS emulator) + k3s (Kubernetes) + Docker Registry
#
# Usage:
#   docker compose up -d       # Start everything
#   docker compose down -v     # Destroy everything (including volumes)
#   docker compose logs -f     # Follow logs

services:
  # Floci - Local AWS emulator (24ms startup, 13 MiB idle)
  # Drop-in replacement for LocalStack at localhost:4566
  floci:
    image: floci/floci:latest
    container_name: floci
    ports:
      - "4566:4566"
    environment:
      - FLOCI_REGION=us-east-1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Local Docker Registry
  registry:
    image: registry:2
    container_name: local-registry
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/v2/"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  registry-data:
